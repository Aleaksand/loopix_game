name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Build and Sign APK
      run: |
        echo '{"android": {"release": {"packageType": "apk"}}}' > ${{ github.workspace }}/build.json
        
        cordova create build-temp com.yourname.circuitblast CircuitBlast
        cp -r www build-temp/
        cp config.xml build-temp/
        
        cd build-temp
        cordova platform add android
        cordova build android --release --buildConfig=${{ github.workspace }}/build.json
        
        # Ищем APK во всем каталоге build-temp по маске
        APK_PATH=$(find . -name "*-release-unsigned.apk" | head -n 1)
        
        if [ -z "$APK_PATH" ]; then
          echo "❌ Ошибка: APK файл не найден!"
          exit 1
        fi
        
        echo "✅ APK найден по пути: $APK_PATH"
        APK_DIR=$(dirname "$APK_PATH")
        
        keytool -genkey -v -keystore "$APK_DIR/my.keystore" -keyalg RSA -keysize 2048 -validity 10000 -alias app -storepass password -keypass password -dname "CN=Android,O=Android,C=US"
        
        APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        $APK_SIGNER sign --ks "$APK_DIR/my.keystore" --ks-key-alias app --ks-pass pass:password --key-pass pass:password --out "CircuitBlast.apk" "$APK_PATH"
        
        # Сохраняем абсолютный путь к итоговому файлу
        echo "FINAL_APK_PATH=$(pwd)/CircuitBlast.apk" >> $GITHUB_ENV
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CircuitBlast-APK
        path: ${{ env.FINAL_APK_PATH }}
