name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    # 📁 создаём проект
    - name: Create Cordova Project
      run: |
        cordova create build-temp com.yourname.circuitblast CircuitBlast
        cp -r www build-temp/
        cp config.xml build-temp/
    
    # 📱 добавляем платформу
    - name: Add Android Platform
      working-directory: build-temp
      run: |
        cordova platform add android@latest
        cordova requirements
    
    # 🔢 versionCode
    - name: Set versionCode
      working-directory: build-temp
      run: |
        VERSION_CODE=${{ github.run_number }}
        sed -i "s/android-versionCode=\"[0-9]*\"/android-versionCode=\"$VERSION_CODE\"/" config.xml || \
        sed -i "s/<widget/<widget android-versionCode=\"$VERSION_CODE\"/" config.xml
    
    # 🔐 keystore из secrets
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my.keystore
    
    # 🔐 настройка подписи (ВАЖНО: после platform add)
    - name: Setup signing
      working-directory: build-temp/platforms/android
      run: |
        echo "➡️ Настраиваем подпись..."

        cat >> gradle.properties <<EOF
        MYAPP_UPLOAD_STORE_FILE=../../../../my.keystore
        MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
        MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
        MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        EOF

        # добавляем signingConfigs если нет
        sed -i '/android {/a\
            signingConfigs {\
                release {\
                    storeFile file(MYAPP_UPLOAD_STORE_FILE)\
                    storePassword MYAPP_UPLOAD_STORE_PASSWORD\
                    keyAlias MYAPP_UPLOAD_KEY_ALIAS\
                    keyPassword MYAPP_UPLOAD_KEY_PASSWORD\
                }\
            }\
        ' app/build.gradle

        # подключаем подпись к release
        sed -i '/buildTypes {/a\
            release {\
                signingConfig signingConfigs.release\
            }\
        ' app/build.gradle
    
    # 📦 сборка AAB
    - name: Build AAB
      working-directory: build-temp
      run: cordova build android --release -- --packageType=bundle
    
    # 🔍 найти AAB
    - name: Find AAB
      run: |
        echo "🔍 Ищем AAB..."
        find . -name "*.aab"
        AAB_PATH=$(find . -name "*.aab" | head -n 1)
        echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
    
    # 📤 сохранить артефакт
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: CircuitBlast-AAB
        path: ${{ env.AAB_PATH }}
