name: Build Loopix APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Cordova + tools
      run: |
        npm install -g cordova
        npm install -g cordova-res

    # 📁 создаём проект
    - name: Create Cordova Project
      run: |
        cordova create build-temp com.tsevan.loopix Loopix
        cp -r www build-temp/
        cp config.xml build-temp/
        cp -r resources build-temp/

    # 📱 Android
    - name: Add Android Platform
      working-directory: build-temp
      run: cordova platform add android

    # 🎨 Генерация иконки и splash
    - name: Generate Resources
      working-directory: build-temp
      run: cordova-res android --skip-config --copy

    # 💦 Splash plugin
    - name: Add Splash Plugin
      working-directory: build-temp
      run: cordova plugin add cordova-plugin-splashscreen

    # 🔢 versionCode
    - name: Set versionCode
      working-directory: build-temp
      run: |
        VERSION_CODE=${{ github.run_number }}
        sed -i "s/<widget/<widget android-versionCode=\"$VERSION_CODE\"/" config.xml

    # 🔐 keystore
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my.keystore

    # 🔐 build config
    - name: Create build.json
      working-directory: build-temp
      run: |
        cat > build.json <<EOF
        {
          "android": {
            "release": {
              "keystore": "../my.keystore",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
              "alias": "${{ secrets.KEY_ALIAS }}",
              "password": "${{ secrets.KEY_PASSWORD }}"
            }
          }
        }
        EOF

    # 📦 сборка APK
    - name: Build APK
      working-directory: build-temp
      run: |
        cordova build android --release \
        --buildConfig=$(pwd)/build.json \
        -- --packageType=apk

    # 🔍 найти APK
    - name: Find APK
      run: |
        APK_PATH=$(find . -name "*.apk" | head -n 1)
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

    # 📤 загрузка
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Loopix-APK
        path: ${{ env.APK_PATH }}
