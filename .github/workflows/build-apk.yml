name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Create Cordova Project
      run: |
        cordova create build-temp com.yourname.circuitblast CircuitBlast
        cp -r www build-temp/
        cp config.xml build-temp/
    
    - name: Add Android Platform
      working-directory: build-temp
      run: cordova platform add android
    
    - name: Build APK
      working-directory: build-temp
      run: cordova build android --release -- --packageType=apk
    
    - name: Find and Sign APK
      run: |
        # Ищем APK по всему workspace
        echo "🔍 Ищем APK..."
        find ${{ github.workspace }} -name "*.apk" -type f 2>/dev/null
        
        # Пробуем разные возможные пути
        APK_PATHS=(
          "${{ github.workspace }}/build-temp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          "${{ github.workspace }}/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          "${{ github.workspace }}/build-temp/platforms/android/app/build/outputs/apk/release/app-release.apk"
        )
        
        APK_PATH=""
        for path in "${APK_PATHS[@]}"; do
          if [ -f "$path" ]; then
            APK_PATH="$path"
            echo "✅ APK найден: $APK_PATH"
            break
          fi
        done
        
        if [ -z "$APK_PATH" ]; then
          echo "❌ APK не найден ни по одному из путей"
          exit 1
        fi
        
        APK_DIR=$(dirname "$APK_PATH")
        
        # Генерируем keystore
        keytool -genkey -v -keystore "$APK_DIR/my.keystore" -keyalg RSA -keysize 2048 -validity 10000 -alias app -storepass password -keypass password -dname "CN=Android,O=Android,C=US"
        
        # Подписываем APK
        APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        $APK_SIGNER sign --ks "$APK_DIR/my.keystore" --ks-key-alias app --ks-pass pass:password --key-pass pass:password --out "${{ github.workspace }}/CircuitBlast.apk" "$APK_PATH"
        
        echo "FINAL_APK_PATH=${{ github.workspace }}/CircuitBlast.apk" >> $GITHUB_ENV
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CircuitBlast-APK
        path: ${{ env.FINAL_APK_PATH }}
