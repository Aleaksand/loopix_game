name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    - name: Build and Sign APK
      run: |
        # Создаём cordova проект СРАЗУ с нужным build.json внутри
        cordova create build-temp com.yourname.circuitblast CircuitBlast
        
        # Копируем файлы проекта
        cp -r www build-temp/
        cp config.xml build-temp/
        
        # Создаём build.json внутри проекта (важно!)
        echo '{"android": {"release": {"packageType": "apk"}}}' > build-temp/build.json
        
        # Переходим в директорию проекта
        cd build-temp
        
        # Добавляем платформу
        cordova platform add android
        
        # Собираем с build.json (теперь он в корне проекта)
        cordova build android --release --buildConfig=build.json
        
        # Проверяем путь к APK
        APK_PATH="platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk"
        
        if [ ! -f "$APK_PATH" ]; then
          echo "❌ Файл не найден по пути: $(pwd)/$APK_PATH"
          find . -name "*.apk" -type f
          exit 1
        fi
        
        echo "✅ APK найден: $(pwd)/$APK_PATH"
        APK_DIR=$(dirname "$APK_PATH")
        
        # Генерируем keystore
        keytool -genkey -v -keystore "$APK_DIR/my.keystore" -keyalg RSA -keysize 2048 -validity 10000 -alias app -storepass password -keypass password -dname "CN=Android,O=Android,C=US"
        
        # Подписываем APK
        APK_SIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
        $APK_SIGNER sign --ks "$APK_DIR/my.keystore" --ks-key-alias app --ks-pass pass:password --key-pass pass:password --out "CircuitBlast.apk" "$APK_PATH"
        
        # Сохраняем путь к финальному APK
        echo "FINAL_APK_PATH=$(pwd)/CircuitBlast.apk" >> $GITHUB_ENV
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CircuitBlast-APK
        path: ${{ env.FINAL_APK_PATH }}
