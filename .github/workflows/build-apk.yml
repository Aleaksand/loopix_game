name: Build AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Cordova
      run: npm install -g cordova
    
    # 📁 проект
    - name: Create Cordova Project
      run: |
        cordova create build-temp com.yourname.circuitblast CircuitBlast
        cp -r www build-temp/
        cp config.xml build-temp/
    
    # 📱 платформа
    - name: Add Android Platform
      working-directory: build-temp
      run: cordova platform add android
    
    # 🔢 versionCode
    - name: Set versionCode
      working-directory: build-temp
      run: |
        VERSION_CODE=${{ github.run_number }}
        sed -i "s/android-versionCode=\"[0-9]*\"/android-versionCode=\"$VERSION_CODE\"/" config.xml || \
        sed -i "s/<widget/<widget android-versionCode=\"$VERSION_CODE\"/" config.xml
    
    # 🔐 keystore
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my.keystore
    
    # 🔐 cordova build.json (ВАЖНО)
    - name: Create build.json
      working-directory: build-temp
      run: |
        cat > build.json <<EOF
        {
          "android": {
            "release": {
              "keystore": "../my.keystore",
              "storePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
              "alias": "${{ secrets.KEY_ALIAS }}",
              "password": "${{ secrets.KEY_PASSWORD }}",
              "keystoreType": ""
            }
          }
        }
        EOF
    
    # 📦 сборка
    - name: Build AAB
      working-directory: build-temp
      run: cordova build android --release --buildConfig=build.json -- --packageType=bundle
    
    # 🔍 найти AAB
    - name: Find AAB
      run: |
        AAB_PATH=$(find . -name "*.aab" | head -n 1)
        echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
    
    # 📤 сохранить
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: CircuitBlast-AAB
        path: ${{ env.AAB_PATH }}
